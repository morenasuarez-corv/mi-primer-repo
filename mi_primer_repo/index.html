<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi primer repo</title>
    <style>
        body {
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px;
            color: #2d3436;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
        }

        img {
            width: 200px;
            margin-top: 15px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #6c5ce7;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            background: #4834d4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hola Git y GitHub</h1>
        <p>Este es mi primer proyecto versionado</p>
        <h2>Estoy aprendiendo Git 🚀</h2>

        <img src="https://via.placeholder.com/300" alt="Imagen">

        <br>

        <a href="https://github.com" target="_blank">Ir a GitHub</a>
    </div>

</body>
</html>
